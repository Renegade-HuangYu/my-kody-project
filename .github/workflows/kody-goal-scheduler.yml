# Scheduled kody capability: goal-scheduler
# Generated by `kody-engine init`. Regenerate with `kody-engine init --force`.
# Edit the cron below or the capability's implementation profile.json#schedule.

name: kody goal-scheduler

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      issues: write
      pull-requests: read
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.KODY_TOKEN || github.token }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - env:
          GH_TOKEN: ${{ secrets.KODY_TOKEN || github.token }}
        run: npx -y -p @kody-ade/kody-engine@latest kody-engine exec goal-scheduler
